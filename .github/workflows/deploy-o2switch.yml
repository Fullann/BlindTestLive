name: Build, Start & Deploy (o2switch FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test (start app + routes)
        run: |
          PORT=3000 ENABLE_DB=false npm run start > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          for i in {1..40}; do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:3000/ > /dev/null
          kill $SERVER_PID

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: |
            app.cjs
            dist
            build-server
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_start
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: deploy-bundle

      - name: Deploy via FTPS (o2switch)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          protocol: ftps
          local-dir: deploy-bundle/
          server-dir: ${{ secrets.SFTP_TARGET_DIR }}
